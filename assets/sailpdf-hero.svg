<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">SailPDF nautical background</title>
  <desc id="desc">A stylized sailing route over the sea with a sailboat and document-shaped sails.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#123b58"/>
      <stop offset=".48" stop-color="#0c7c74"/>
      <stop offset="1" stop-color="#f0b45c"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#082f46"/>
      <stop offset=".52" stop-color="#0a6a76"/>
      <stop offset="1" stop-color="#0f8a80"/>
    </linearGradient>
    <linearGradient id="sail" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dcebe8"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#06212f" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="1400" height="760" fill="url(#sky)"/>
  <circle cx="1110" cy="190" r="92" fill="#f2c173" opacity=".88"/>
  <circle cx="1110" cy="190" r="138" fill="#f2c173" opacity=".16"/>

