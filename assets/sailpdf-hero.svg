  <path d="M0 520C168 459 278 564 421 510c163-62 262-95 421-44 139 45 232 92 374 44 72-24 129-63 184-78v328H0Z" fill="#f7f4ef" opacity=".16"/>
  <path d="M0 595C182 548 274 631 433 594c133-31 229-83 388-47 178 40 309 96 579 12v201H0Z" fill="#ffffff" opacity=".12"/>

  <path d="M195 365C332 293 467 275 605 306c139 31 239 105 368 103 109-2 204-52 292-114" fill="none" stroke="#ffd08a" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 20" opacity=".72"/>
  <circle cx="195" cy="365" r="9" fill="#ffd08a"/>
  <circle cx="1265" cy="295" r="9" fill="#ffd08a"/>

  <g filter="url(#soft-shadow)" transform="translate(720 190)">
    <path d="M0 0v310" stroke="#123b58" stroke-width="10" stroke-linecap="round"/>
    <path d="M12 16C119 64 197 161 226 291H18Z" fill="url(#sail)"/>
