    <path d="M18 76h108M35 124h128M52 172h142M70 220h129" stroke="#0c7c74" stroke-width="9" stroke-linecap="round" opacity=".68"/>
    <path d="M-222 304h512l-54 52H-168Z" fill="#17211f"/>
    <path d="M-146 322c77 29 156 29 238 0 47-17 87-18 126-5l-27 25H-120Z" fill="#f7f4ef" opacity=".18"/>
  </g>

  <path d="M112 647c101-28 199-28 294 0s197 28 306 0 211-28 305 0 187 28 281 0" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity=".22"/>
  <path d="M146 696c80-21 160-21 240 0s160 21 240 0 160-21 240 0 160 21 240 0" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity=".16"/>
